<svg width="1200" height="630" viewBox="0 0 1200 630" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1200" y2="630" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#0F172A"/>
      <stop offset="0.52" stop-color="#172033"/>
      <stop offset="1" stop-color="#1E293B"/>
    </linearGradient>

    <radialGradient id="blueGlow" cx="0" cy="0" r="1" gradientUnits="userSpaceOnUse" gradientTransform="translate(220 90) rotate(50) scale(520 360)">
      <stop offset="0" stop-color="#3B82F6" stop-opacity="0.55"/>
      <stop offset="1" stop-color="#3B82F6" stop-opacity="0"/>
    </radialGradient>

    <radialGradient id="redGlow" cx="0" cy="0" r="1" gradientUnits="userSpaceOnUse" gradientTransform="translate(1010 120) rotate(130) scale(460 330)">
      <stop offset="0" stop-color="#EF4444" stop-opacity="0.42"/>
      <stop offset="1" stop-color="#EF4444" stop-opacity="0"/>
    </radialGradient>

    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="20" stdDeviation="25" flood-color="#000000" flood-opacity="0.28"/>
    </filter>

    <style>
      .sans {
        font-family:
          -apple-system,
          BlinkMacSystemFont,
          "Segoe UI",
          "Hiragino Kaku Gothic ProN",
          "Yu Gothic",
          "Meiryo",
          sans-serif;
      }

      .label {
        font-size: 28px;
        font-weight: 800;
        letter-spacing: 0.12em;
      }

      .title {
        font-size: 72px;
        font-weight: 900;
        letter-spacing: -0.04em;
      }

      .subtitle {
        font-size: 34px;
        font-weight: 800;
        letter-spacing: -0.02em;
      }

      .body {
        font-size: 27px;
        font-weight: 600;
        letter-spacing: -0.01em;
      }

      .small {
        font-size: 23px;
        font-weight: 700;
      }

      .metric-number {
        font-size: 38px;
        font-weight: 900;
        letter-spacing: -0.04em;
      }

      .metric-label {
        font-size: 19px;
        font-weight: 700;
      }
    </style>
  </defs>

  <!-- Background -->
  <rect width="1200" height="630" fill="url(#bg)"/>
  <rect width="1200" height="630" fill="url(#blueGlow)"/>
  <rect width="1200" height="630" fill="url(#redGlow)"/>

  <!-- Decorative grid -->
  <g opacity="0.12">
    <path d="M0 120H1200" stroke="#FFFFFF"/>
    <path d="M0 240H1200" stroke="#FFFFFF"/>
    <path d="M0 360H1200" stroke="#FFFFFF"/>
    <path d="M0 480H1200" stroke="#FFFFFF"/>
    <path d="M200 0V630" stroke="#FFFFFF"/>
    <path d="M400 0V630" stroke="#FFFFFF"/>
    <path d="M600 0V630" stroke="#FFFFFF"/>
    <path d="M800 0V630" stroke="#FFFFFF"/>
    <path d="M1000 0V630" stroke="#FFFFFF"/>
  </g>

  <!-- Top label -->
  <g class="sans">
    <rect x="70" y="62" width="405" height="48" rx="24" fill="#DBEAFE" fill-opacity="0.12" stroke="#93C5FD" stroke-opacity="0.35"/>
    <text x="96" y="95" class="label" fill="#BFDBFE">HORMUZ CRISIS REPORT</text>
  </g>

  <!-- Main title -->
  <g class="sans">
    <text x="70" y="205" class="title" fill="#FFFFFF">不完全な停戦、</text>
    <text x="70" y="292" class="title" fill="#FFFFFF">動かない海峡</text>

<text x="74" y="352" class="subtitle" fill="#FECACA">
  ホルムズ海峡危機、1か月で見えた
</text>

<text x="74" y="397" class="subtitle" fill="#FECACA">
  供給正常化の壁
</text>

<text x="74" y="434" class="body" fill="#DBEAFE">
  2026年4月8日の予測 vs 5月8日の現実
</text>
  </g>

  <!-- Core message card -->
  <g filter="url(#shadow)">
    <rect x="70" y="448" width="690" height="104" rx="24" fill="#0F172A" fill-opacity="0.72" stroke="#60A5FA" stroke-opacity="0.35"/>
    <rect x="70" y="448" width="8" height="104" rx="4" fill="#60A5FA"/>
    <text x="104" y="492" class="sans small" fill="#93C5FD">核心</text>
    <text x="104" y="531" class="sans body" fill="#FFFFFF">
    政治合意と供給正常化は別物である
    </text>
  </g>

  <!-- Right panel -->
  <g filter="url(#shadow)">
    <rect x="815" y="145" width="315" height="407" rx="30" fill="#FFFFFF" fill-opacity="0.08" stroke="#FFFFFF" stroke-opacity="0.18"/>
    <rect x="815" y="145" width="315" height="8" rx="4" fill="#EF4444"/>

    <text x="845" y="197" class="sans small" fill="#FECACA">KEY INDICATORS</text>

    <g class="sans">
      <text x="845" y="260" class="metric-number" fill="#FFFFFF">約1,600隻</text>
      <text x="845" y="290" class="metric-label" fill="#CBD5E1">ペルシャ湾内で滞留</text>

      <line x1="845" y1="322" x2="1100" y2="322" stroke="#FFFFFF" stroke-opacity="0.16"/>

      <text x="845" y="374" class="metric-number" fill="#FFFFFF">114〜126ドル</text>
      <text x="845" y="404" class="metric-label" fill="#CBD5E1">ブレント原油価格</text>

      <line x1="845" y1="436" x2="1100" y2="436" stroke="#FFFFFF" stroke-opacity="0.16"/>

      <text x="845" y="488" class="metric-number" fill="#FFFFFF">125,103円/kL</text>
      <text x="845" y="518" class="metric-label" fill="#CBD5E1">国産ナフサ価格</text>
    </g>
  </g>

  <!-- Bottom URL -->
  <g class="sans">
    <text x="70" y="596" class="small" fill="#94A3B8">
      GitHub Pages Dashboard Report
    </text>
  </g>
</svg>
